<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document Intelligence Platform</title>
  <link rel="stylesheet" href="/static/app.css">
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="/static/app.js"></script>
</head>
<body>
<div class="layout" x-data="docintel">
  <aside class="sidebar">
    <div class="sidebar-logo"><span>DocIntel</span><small>v0.3.0</small></div>
    <div class="nav-section">
      <div class="nav-label">Main</div>
      <div class="nav-item" :class="{active: view==='dashboard'}" @click="_go('dashboard')"><span class="icon">&#9632;</span><span class="nav-label-text">Dashboard</span></div>
      <div class="nav-item" :class="{active: view==='upload'}" @click="view='upload'; uploadResults=[];"><span class="icon">&#8679;</span><span class="nav-label-text">Upload</span></div>
      <div class="nav-item" :class="{active: view==='documents'}" @click="_go('documents')"><span class="icon">&#9783;</span><span class="nav-label-text">Documents</span></div>
    </div>
    <div class="nav-section">
      <div class="nav-label">Workflow</div>
      <div class="nav-item" :class="{active: view==='review'}" @click="_go('review')">
        <span class="icon">&#10003;</span><span class="nav-label-text">Review queue</span>
        <span class="nav-badge" x-show="reviewTasks.length > 0" x-text="reviewTasks.length"></span>
      </div>
      <div class="nav-item" :class="{active: view==='analytics'}" @click="_go('analytics')"><span class="icon">&#9650;</span><span class="nav-label-text">Analytics</span></div>
    </div>
    <div class="sidebar-footer">
      <div class="form-label" style="margin-bottom:4px">API key</div>
      <input type="password" class="api-key-input" placeholder="Leave empty to skip auth" x-model="apiKey">
    </div>
  </aside>

  <div class="main">
    <div class="topbar">
      <h1 x-text="{dashboard:'Dashboard',upload:'Upload documents',documents:'Documents',review:'Review queue',analytics:'Analytics'}[view] || view"></h1>
      <div class="topbar-actions">
        <template x-if="view==='documents'"><button class="btn btn-primary btn-sm" @click="view='upload'; uploadResults=[];">&#8679; Upload</button></template>
        <template x-if="view==='review'"><button class="btn btn-sm" @click="_loadReview()">&#8635; Refresh</button></template>
      </div>
    </div>

    <div class="content">
      <div x-show="view==='dashboard'">
        <template x-if="dashLoading"><div class="empty"><div class="spinner"></div></div></template>
        <template x-if="dashError"><div class="empty"><p class="badge badge-error" x-text="dashError"></p></div></template>
        <template x-if="!dashLoading && metrics">
          <div>
            <div class="kpi-grid">
              <div class="kpi-card"><div class="kpi-label">Total documents</div><div class="kpi-value" x-text="metrics.total_documents ?? 0"></div><div class="kpi-sub" x-text="(metrics.by_status?.completed ?? 0) + ' completed'"></div></div>
              <div class="kpi-card"><div class="kpi-label">Pending review</div><div class="kpi-value" x-text="metrics.pending_review_tasks ?? 0"></div><div class="kpi-sub">low-confidence fields</div></div>
              <div class="kpi-card"><div class="kpi-label">Avg confidence</div><div class="kpi-value" x-text="metrics.avg_document_confidence != null ? fmtConf(metrics.avg_document_confidence) : '—'"></div><div class="kpi-sub">across all documents</div></div>
              <div class="kpi-card"><div class="kpi-label">Total corrections</div><div class="kpi-value" x-text="metrics.total_corrections ?? 0"></div><div class="kpi-sub">active-learning labels</div></div>
            </div>
            <div class="grid-2">
              <div class="card">
                <div class="card-title">By status</div>
                <div class="stat-row" x-show="metrics.by_status && Object.keys(metrics.by_status).length">
                  <template x-for="[k, v] in Object.entries(metrics.by_status)" :key="k"><div class="stat-pill"><span :class="'badge ' + sb(k)" x-text="k"></span><span style="margin-left:4px;font-weight:500" x-text="v"></span></div></template>
                </div>
              </div>
              <div class="card">
                <div class="card-title">By document type</div>
                <div class="stat-row" x-show="metrics.by_document_type && Object.keys(metrics.by_document_type).length">
                  <template x-for="[k, v] in Object.entries(metrics.by_document_type)" :key="k"><div class="stat-pill"><span class="mono text-sm" x-text="k"></span><span style="margin-left:6px;font-weight:500" x-text="v"></span></div></template>
                </div>
              </div>
            </div>
            <div class="card mt-20">
              <div class="card-title">Recent documents</div>
              <div class="table-wrap" x-show="recentDocs.length">
                <table>
                  <thead><tr><th>Filename</th><th>Type</th><th>Status</th><th>Confidence</th><th>Uploaded</th></tr></thead>
                  <tbody>
                    <template x-for="d in recentDocs" :key="d.id">
                      <tr @click="_go('documents'); $nextTick(()=> openDoc(d))">
                        <td class="truncate" style="max-width:200px" x-text="d.filename"></td>
                        <td><span class="mono text-sm" x-text="d.document_type || '—'"></span></td>
                        <td><span class="badge" :class="sb(d.status)" x-text="d.status"></span></td>
                        <td><span :style="'color:' + confColor(d.document_confidence); font-weight:500" x-text="d.document_confidence != null ? fmtConf(d.document_confidence) : '—'"></span></td>
                        <td class="text-muted text-sm" x-text="fmtDate(d.created_at)"></td>
                      </tr>
                    </template>
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        </template>
      </div>

      <div x-show="view==='upload'">
        <div class="card" style="max-width:640px">
          <div class="upload-zone" :class="{dragover}" @dragover.prevent="dragover=true" @dragleave="dragover=false" @drop="handleDrop($event)" @click="$refs.fileInput.click()">
            <div class="zone-icon">&#8679;</div><p>Drop files here or click to browse</p><small>Supports PDF, JPEG, PNG, TIFF, WebP</small>
          </div>
          <input type="file" x-ref="fileInput" multiple accept=".pdf,.jpg,.jpeg,.png,.tiff,.tif,.webp" style="display:none" @change="handlePick($event)">
          <div class="file-list" x-show="uploadFiles.length">
            <template x-for="(f, i) in uploadFiles" :key="i"><div class="file-item"><span class="file-name" x-text="f.name"></span><span class="file-size" x-text="formatBytes(f.size)"></span><button class="file-remove" @click.stop="removeFile(i)">&times;</button></div></template>
            <div class="flex gap-8 mt-12"><button class="btn btn-primary" @click="uploadAll()" :disabled="uploading || !uploadFiles.length">Upload</button><button class="btn" @click="uploadFiles=[]">Clear</button></div>
          </div>
        </div>
        <div class="mt-16" x-show="uploadResults.length">
          <div class="card-title mb-8">Upload results</div>
          <div style="display:flex;flex-direction:column;gap:6px">
            <template x-for="r in uploadResults" :key="r.name"><div class="upload-result" :class="r.ok ? 'ok' : 'err'"><span x-text="r.ok ? 'OK' : 'ERR'"></span><span x-text="r.name" class="truncate" style="flex:1"></span><span class="text-sm" x-text="r.ok ? ('Task: ' + r.taskId?.slice(0,8)) : r.error"></span></div></template>
          </div>
        </div>
      </div>

      <div x-show="view==='documents'">
        <div class="filter-bar">
          <input class="input input-sm" style="width:220px" placeholder="Search filename or OCR text..." x-model.debounce.400ms="searchQ" @input="searchDocs()">
          <select class="input input-sm" x-model="filterStatus" @change="_loadDocs(0)">
            <option value="">All statuses</option><option value="uploaded">Uploaded</option><option value="queued">Queued</option><option value="processing">Processing</option><option value="completed">Completed</option><option value="review_required">Review required</option><option value="failed">Failed</option>
          </select>
          <select class="input input-sm" x-model="filterType" @change="_loadDocs(0)">
            <option value="">All types</option><option value="invoice">Invoice</option><option value="bank_statement">Bank statement</option><option value="receipt">Receipt</option><option value="contract">Contract</option>
          </select>
          <div class="spacer"></div><span class="text-sm text-muted" x-text="docsTotal + ' total'"></span><button class="btn btn-sm" @click="_loadDocs(docsPage)">&#8635;</button>
        </div>
        <template x-if="docsLoading"><div class="empty"><div class="spinner"></div></div></template>
        <template x-if="docsError"><div class="empty"><span class="badge badge-error" x-text="docsError"></span></div></template>
        <template x-if="!docsLoading && docs.length">
          <div class="card" style="padding:0;overflow:hidden">
            <div class="table-wrap">
              <table>
                <thead><tr><th style="width:30%">Filename</th><th>Type</th><th>Status</th><th>Confidence</th><th>Pipeline</th><th>Created</th><th style="width:80px"></th></tr></thead>
                <tbody>
                  <template x-for="d in docs" :key="d.id">
                    <tr @click="openDoc(d)">
                      <td class="truncate" x-text="d.filename"></td>
                      <td><span class="mono text-sm" x-text="d.document_type || '—'"></span></td>
                      <td><span class="badge" :class="sb(d.status)" x-text="d.status.replace('_',' ')"></span></td>
                      <td><span :style="'font-weight:500;color:' + confColor(d.document_confidence)" x-text="d.document_confidence != null ? fmtConf(d.document_confidence) : '—'"></span></td>
                      <td class="mono text-sm text-hint" x-text="d.pipeline_version"></td>
                      <td class="text-sm text-muted" x-text="fmtDate(d.created_at)"></td>
                      <td @click.stop><div class="flex gap-8"><button class="btn btn-sm" @click="reprocess(d.id)">&#8635;</button><button class="btn btn-sm btn-danger" @click="deleteDoc(d.id)">&times;</button></div></td>
                    </tr>
                  </template>
                </tbody>
              </table>
            </div>
          </div>
        </template>
      </div>

      <div x-show="view==='review'">
        <template x-if="reviewLoading"><div class="empty"><div class="spinner"></div></div></template>
        <template x-if="reviewError"><div class="empty"><span class="badge badge-error" x-text="reviewError"></span></div></template>
        <template x-if="!reviewLoading && reviewTasks.length">
          <div class="grid-2" style="align-items:start">
            <div>
              <div class="mb-8 text-sm text-muted" x-text="reviewTasks.length + ' pending task(s)'"></div>
              <div style="display:flex;flex-direction:column;gap:8px">
                <template x-for="t in reviewTasks" :key="t.id"><div class="task-card" :class="{selected: selTask?.id === t.id}" @click="selectTask(t)"><h3 x-text="t.field_name.replace(/_/g,' ')"></h3><div class="task-meta"><span x-text="'Conf: ' + fmtConf(t.confidence)"></span><span class="truncate" x-text="t.document_id.slice(0,8) + '...'"></span><span x-show="t.page_number" x-text="'p.' + t.page_number"></span></div><div class="snippet mt-12" x-show="t.source_snippet" x-text="t.source_snippet"></div></div></template>
              </div>
            </div>
            <div class="review-panel" x-show="selTask">
              <h3 style="font-size:15px;font-weight:500;margin-bottom:16px" x-text="selTask?.field_name?.replace(/_/g,' ')"></h3>
              <div class="field-row"><span class="field-key">Current value</span><span class="field-val mono" x-text="fmtField(selTask?.proposed_value?.value)"></span></div>
              <div class="field-row"><span class="field-key">Confidence</span><span class="field-val" :style="'color:' + confColor(selTask?.confidence)" x-text="fmtConf(selTask?.confidence)"></span></div>
              <div class="form-group mt-16"><label class="form-label">Corrected value</label><input class="input w-full" x-model="correctedValue"></div>
              <div class="form-group"><label class="form-label">Your name</label><input class="input w-full" x-model="reviewerName"></div>
              <div class="form-group"><label class="form-label">Comment</label><textarea class="input w-full" x-model="reviewComment" rows="2"></textarea></div>
              <div class="flex gap-8"><button class="btn btn-primary" @click="submitReview()" :disabled="reviewSubmitting || !reviewerName.trim()">Submit correction</button><button class="btn" @click="selTask=null">Cancel</button></div>
            </div>
          </div>
        </template>
      </div>

      <div x-show="view==='analytics'">
        <template x-if="analyticsLoading"><div class="empty"><div class="spinner"></div></div></template>
        <template x-if="analyticsError"><div class="empty"><span class="badge badge-error" x-text="analyticsError"></span></div></template>
        <template x-if="!analyticsLoading && analyticsMetrics">
          <div>
            <div class="kpi-grid" style="margin-bottom:20px">
              <div class="kpi-card"><div class="kpi-label">Total documents</div><div class="kpi-value" x-text="analyticsMetrics.total_documents ?? 0"></div></div>
              <div class="kpi-card"><div class="kpi-label">Avg confidence</div><div class="kpi-value" x-text="analyticsMetrics.avg_document_confidence != null ? fmtConf(analyticsMetrics.avg_document_confidence) : '—'"></div></div>
              <div class="kpi-card"><div class="kpi-label">Pending review</div><div class="kpi-value" x-text="analyticsMetrics.pending_review_tasks ?? 0"></div></div>
              <div class="kpi-card"><div class="kpi-label">Corrections logged</div><div class="kpi-value" x-text="analyticsMetrics.total_corrections ?? 0"></div></div>
            </div>
            <div class="grid-3">
              <div class="card" style="grid-column:span 2"><div class="card-title">OCR confidence distribution</div><div class="chart-wrap"><canvas id="chart-ocr"></canvas></div></div>
              <div class="card"><div class="card-title">Document types</div><div class="chart-wrap"><canvas id="chart-types"></canvas></div></div>
            </div>
            <div class="card mt-20"><div class="card-title">Fields with most corrections</div><div class="chart-wrap"><canvas id="chart-corrections"></canvas></div></div>
            <div class="card mt-20">
              <div class="card-title">Learned draft preferences</div>
              <div class="table-wrap" x-show="preferences.length">
                <table>
                  <thead><tr><th>Preference</th><th>Type</th><th>Uses</th><th>Score</th><th style="width:80px"></th></tr></thead>
                  <tbody>
                    <template x-for="p in preferences" :key="p.id">
                      <tr>
                        <td x-text="p.preference_text"></td>
                        <td class="mono text-sm" x-text="p.document_type"></td>
                        <td x-text="p.application_count"></td>
                        <td x-text="p.effectiveness_score != null ? fmtConf(p.effectiveness_score) : '—'"></td>
                        <td><button class="btn btn-sm btn-danger" @click="deletePreference(p.id)">&times;</button></td>
                      </tr>
                    </template>
                  </tbody>
                </table>
              </div>
              <div class="empty" x-show="!preferences.length"><span class="text-muted">No learned preferences yet.</span></div>
            </div>
          </div>
        </template>
      </div>
    </div>
  </div>

  <div class="modal-overlay" x-show="showModal" @click.self="closeModal()" style="display:none">
    <div class="modal" x-show="showModal" @keydown.escape.window="closeModal()">
      <div class="modal-header">
        <h2 x-text="selDoc?.filename || 'Document detail'"></h2>
        <div class="flex gap-8 items-center"><span class="badge" :class="sb(selDoc?.status)" x-text="selDoc?.status?.replace(/_/g,' ')"></span><button class="modal-close" @click="closeModal()">&times;</button></div>
      </div>
      <div class="modal-body">
        <template x-if="modalLoading"><div class="empty" style="padding:40px"><div class="spinner"></div></div></template>
        <template x-if="!modalLoading && selDoc">
          <div>
            <div class="flex gap-12 mb-12" style="flex-wrap:wrap">
              <span class="stat-pill mono text-sm" x-text="selDoc.id?.slice(0,8) + '...'"></span>
              <span class="stat-pill" x-text="selDoc.document_type || 'unknown type'"></span>
              <span class="stat-pill" x-text="fmtDate(selDoc.created_at)"></span>
            </div>
            <div class="grid-2" style="align-items:start">
              <div>
                <div class="card-title">Extracted fields</div>
                <template x-for="[k, v] in Object.entries(selResult?.fields || {})" :key="k"><div class="field-row"><span class="field-key" x-text="k.replace(/_/g,' ')"></span><span class="field-val mono" x-text="fmtField(v)"></span></div></template>
              </div>
              <div>
                <div class="card-title">Field confidence</div>
                <div style="display:flex;flex-direction:column;gap:8px">
                  <template x-for="fc in (selResult?.field_confidences || [])" :key="fc.name">
                    <div>
                      <div class="flex items-center gap-8 mb-12" style="margin-bottom:4px"><span class="text-sm" style="min-width:120px" x-text="fc.name.replace(/_/g,' ')"></span></div>
                      <div class="conf-bar"><div class="conf-track"><div class="conf-fill" :style="'width:' + Math.round(fc.confidence*100) + '%;background:' + confColor(fc.confidence)"></div></div><span class="conf-label" :style="'color:' + confColor(fc.confidence)" x-text="fmtConf(fc.confidence)"></span></div>
                    </div>
                  </template>
                </div>
              </div>
            </div>
            <div class="card mt-20">
              <div class="card-title">Drafts</div>
              <div class="filter-bar" style="padding:0;margin-bottom:12px">
                <select class="input input-sm" x-model="draftType">
                  <option value="internal_memo">Internal memo</option>
                  <option value="case_fact_summary">Case fact summary</option>
                  <option value="contract_summary">Contract summary</option>
                  <option value="notice_summary">Notice summary</option>
                  <option value="document_checklist">Document checklist</option>
                </select>
                <button class="btn btn-primary btn-sm" @click="generateDraft()" :disabled="draftLoading">Generate</button>
                <button class="btn btn-sm" @click="loadDrafts()" :disabled="draftLoading">&#8635;</button>
              </div>
              <template x-if="draftLoading"><div class="empty"><div class="spinner"></div></div></template>
              <template x-if="!draftLoading && drafts.length">
                <div style="display:flex;flex-direction:column;gap:16px">
                  <template x-for="draft in drafts" :key="draft.id">
                    <div class="review-panel" style="display:block">
                      <div class="flex items-center gap-8 mb-12" style="justify-content:space-between">
                        <div><span class="mono text-sm" x-text="draft.draft_type"></span> <span class="badge" :class="draft.status === 'draft' ? 'badge-success' : 'badge-warn'" x-text="draft.status"></span></div>
                        <span class="text-sm text-muted" x-text="draft.word_count + ' words'"></span>
                      </div>
                      <template x-for="section in (draft.content?.sections || [])" :key="section.key">
                        <div class="card" style="box-shadow:none;border:1px solid var(--border);margin-bottom:10px">
                          <div class="flex items-center gap-8" style="justify-content:space-between">
                            <div class="card-title" x-text="section.title"></div>
                            <span class="badge" :class="section.confidence === 'high' ? 'badge-success' : (section.confidence === 'unsupported' ? 'badge-error' : 'badge-warn')" x-text="section.confidence"></span>
                          </div>
                          <p style="white-space:pre-wrap;line-height:1.55" x-text="section.content"></p>
                          <details x-show="section.evidence_chunk_ids?.length">
                            <summary class="text-sm text-muted">Evidence</summary>
                            <div class="snippet mt-12" x-text="section.evidence_chunk_ids?.join(', ')"></div>
                          </details>
                          <div class="form-group mt-16" x-show="draftEditKey === draft.id + ':' + section.key">
                            <textarea class="input w-full" rows="5" x-model="draftEditedContent"></textarea>
                            <div class="flex gap-8 mt-12"><input class="input input-sm" placeholder="Reviewer name" x-model="draftReviewer"><button class="btn btn-primary btn-sm" @click="submitDraftEdit(draft, section)" :disabled="!draftReviewer.trim()">Submit edit</button><button class="btn btn-sm" @click="draftEditKey=''">Cancel</button></div>
                          </div>
                          <button class="btn btn-sm mt-12" x-show="draftEditKey !== draft.id + ':' + section.key" @click="startDraftEdit(draft, section)">Edit</button>
                        </div>
                      </template>
                    </div>
                  </template>
                </div>
              </template>
              <div class="empty" x-show="!draftLoading && !drafts.length"><span class="text-muted">No drafts yet.</span></div>
            </div>
          </div>
        </template>
      </div>
    </div>
  </div>
</div>
</body>
</html>
