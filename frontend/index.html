<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document Intelligence Platform</title>
  <link rel="stylesheet" href="/static/app.css?v=grounding1">
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="/static/app.js?v=grounding1"></script>
</head>
<body>
<div class="layout" x-data="docintel()">
  <aside class="sidebar">
    <div class="sidebar-logo"><span>DocIntel</span><small>v0.3.0</small></div>
    <div class="nav-section">
      <div class="nav-label">Main</div>
      <div class="nav-item" :class="view==='dashboard' ? 'active' : ''" @click="_go('dashboard')"><span class="icon">&#9632;</span><span class="nav-label-text">Dashboard</span></div>
      <div class="nav-item" :class="view==='upload' ? 'active' : ''" @click="view='upload'; uploadResults=[];"><span class="icon">&#8679;</span><span class="nav-label-text">Upload</span></div>
      <div class="nav-item" :class="view==='documents' ? 'active' : ''" @click="_go('documents')"><span class="icon">&#9783;</span><span class="nav-label-text">Documents</span></div>
    </div>
    <div class="nav-section">
      <div class="nav-label">Workflow</div>
      <div class="nav-item" :class="view==='preferences' ? 'active' : ''" @click="_go('preferences')">
        <span class="icon">&#9670;</span><span class="nav-label-text">Preferences</span>
        <span class="nav-badge" x-show="preferences.length > 0" x-text="preferences.length"></span>
      </div>
    </div>
    <div class="sidebar-footer">
      <div class="form-label" style="margin-bottom:4px">API key</div>
      <input type="password" class="api-key-input" placeholder="Leave empty to skip auth" x-model="apiKey">
    </div>
  </aside>

  <div class="main">
    <div class="topbar">
      <h1 x-text="pageTitle()"></h1>
      <div class="topbar-actions">
        <template x-if="view==='detail'"><button class="btn btn-sm" @click="backToDocuments()">&#8592; Back</button></template>
        <template x-if="view==='documents'"><button class="btn btn-primary btn-sm" @click="view='upload'; uploadResults=[];">&#8679; Upload</button></template>
        <template x-if="view==='preferences'"><button class="btn btn-sm" @click="_loadPreferences()">&#8635; Refresh</button></template>
      </div>
    </div>

    <div class="content">
      <div x-show="view==='dashboard'">
        <template x-if="dashLoading"><div class="empty"><div class="spinner"></div></div></template>
        <template x-if="dashError"><div class="empty"><p class="badge badge-error" x-text="dashError"></p></div></template>
        <template x-if="!dashLoading && metrics">
          <div>
            <div class="kpi-grid">
              <div class="kpi-card"><div class="kpi-label">Total documents</div><div class="kpi-value" x-text="(metrics.total_documents || 0)"></div><div class="kpi-sub" x-text="((metrics.by_status && metrics.by_status.completed) || 0) + ' completed'"></div></div>
              <div class="kpi-card"><div class="kpi-label">Pending review</div><div class="kpi-value" x-text="(metrics.pending_review_tasks || 0)"></div><div class="kpi-sub">low-confidence fields</div></div>
              <div class="kpi-card"><div class="kpi-label">Avg confidence</div><div class="kpi-value" x-text="metrics.avg_document_confidence != null ? fmtConf(metrics.avg_document_confidence) : '—'"></div><div class="kpi-sub">across all documents</div></div>
              <div class="kpi-card"><div class="kpi-label">Total corrections</div><div class="kpi-value" x-text="(metrics.total_corrections || 0)"></div><div class="kpi-sub">active-learning labels</div></div>
            </div>
            <div class="grid-2">
              <div class="card">
                <div class="card-title">By status</div>
                <div class="stat-row" x-show="metrics.by_status && Object.keys(metrics.by_status).length">
                  <template x-for="[k, v] in Object.entries(metrics.by_status)" :key="k"><div class="stat-pill"><span :class="'badge ' + sb(k)" x-text="k"></span><span style="margin-left:4px;font-weight:500" x-text="v"></span></div></template>
                </div>
              </div>
              <div class="card">
                <div class="card-title">By document type</div>
                <div class="stat-row" x-show="metrics.by_document_type && Object.keys(metrics.by_document_type).length">
                  <template x-for="[k, v] in Object.entries(metrics.by_document_type)" :key="k"><div class="stat-pill"><span class="mono text-sm" x-text="k"></span><span style="margin-left:6px;font-weight:500" x-text="v"></span></div></template>
                </div>
              </div>
            </div>
            <div class="card mt-20">
              <div class="card-title">Recent documents</div>
              <div class="table-wrap" x-show="recentDocs.length">
                <table>
                  <thead><tr><th>Filename</th><th>Type</th><th>Status</th><th>Confidence</th><th>Uploaded</th></tr></thead>
                  <tbody>
                    <template x-for="d in recentDocs" :key="d.id">
                      <tr @click="_go('documents'); $nextTick(()=> openDoc(d))">
                        <td class="truncate" style="max-width:200px" x-text="d.filename"></td>
                        <td><span class="mono text-sm" x-text="d.document_type || '—'"></span></td>
                        <td><span class="badge" :class="sb(d.status)" x-text="d.status"></span></td>
                        <td><span :style="'color:' + confColor(d.document_confidence) + ';font-weight:500'" x-text="d.document_confidence != null ? fmtConf(d.document_confidence) : '—'"></span></td>
                        <td class="text-muted text-sm" x-text="fmtDate(d.created_at)"></td>
                      </tr>
                    </template>
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        </template>
      </div>

      <div x-show="view==='upload'">
        <div class="card" style="max-width:640px">
          <div class="upload-zone" :class="dragover ? 'dragover' : ''" @dragover.prevent="dragover=true" @dragleave="dragover=false" @drop="handleDrop($event)" @click="$refs.fileInput.click()">
            <div class="zone-icon">&#8679;</div><p>Drop files here or click to browse</p><small>Supports PDF, JPEG, PNG, TIFF, WebP</small>
          </div>
          <input type="file" x-ref="fileInput" multiple accept=".pdf,.jpg,.jpeg,.png,.tiff,.tif,.webp" style="display:none" @change="handlePick($event)">
          <div class="file-list" x-show="uploadFiles.length">
            <template x-for="(f, i) in uploadFiles" :key="i"><div class="file-item"><span class="file-name" x-text="f.name"></span><span class="file-size" x-text="formatBytes(f.size)"></span><button class="file-remove" @click.stop="removeFile(i)">&times;</button></div></template>
            <div class="flex gap-8 mt-12"><button class="btn btn-primary" @click="uploadAll()" :disabled="uploading || !uploadFiles.length">Upload</button><button class="btn" @click="uploadFiles=[]">Clear</button></div>
          </div>
        </div>
        <div class="mt-16" x-show="uploadResults.length">
          <div class="card-title mb-8">Upload results</div>
          <div style="display:flex;flex-direction:column;gap:6px">
            <template x-for="r in uploadResults" :key="r.name"><div class="upload-result" :class="r.ok ? 'ok' : 'err'"><span x-text="r.ok ? 'OK' : 'ERR'"></span><span x-text="r.name" class="truncate" style="flex:1"></span><span class="text-sm" x-text="r.ok ? ('Task: ' + (r.taskId ? r.taskId.slice(0,8) : '')) : r.error"></span></div></template>
          </div>
        </div>
      </div>

      <div x-show="view==='documents'">
        <div class="filter-bar">
          <input class="input input-sm" style="width:220px" placeholder="Search filename or OCR text..." x-model.debounce.400ms="searchQ" @input="searchDocs()">
          <select class="input input-sm" x-model="filterStatus" @change="_loadDocs(0)">
            <option value="">All statuses</option><option value="uploaded">Uploaded</option><option value="queued">Queued</option><option value="processing">Processing</option><option value="completed">Completed</option><option value="review_required">Review required</option><option value="failed">Failed</option>
          </select>
          <select class="input input-sm" x-model="filterType" @change="_loadDocs(0)">
            <option value="">All types</option>
            <option value="legal_complaint">Legal complaint</option>
            <option value="contract">Contract</option>
            <option value="affidavit">Affidavit</option>
            <option value="legal_notice">Legal notice</option>
            <option value="case_brief">Case brief</option>
            <option value="unknown">Unknown</option>
          </select>
          <div class="spacer"></div><span class="text-sm text-muted" x-text="docsTotal + ' total'"></span><button class="btn btn-sm" @click="_loadDocs(docsPage)">&#8635;</button>
        </div>
        <template x-if="docsLoading"><div class="empty"><div class="spinner"></div></div></template>
        <template x-if="docsError"><div class="empty"><span class="badge badge-error" x-text="docsError"></span></div></template>
        <template x-if="!docsLoading && docs.length">
          <div class="card" style="padding:0;overflow:hidden">
            <div class="table-wrap">
              <table>
                <thead><tr><th style="width:30%">Filename</th><th>Type</th><th>Status</th><th>Confidence</th><th>Pipeline</th><th>Created</th><th style="width:80px"></th></tr></thead>
                <tbody>
                  <template x-for="d in docs" :key="d.id">
                    <tr @click="openDoc(d)">
                      <td class="truncate" x-text="d.filename"></td>
                      <td><span class="mono text-sm" x-text="d.document_type || '—'"></span></td>
                      <td><span class="badge" :class="sb(d.status)" x-text="d.status.replace('_',' ')"></span></td>
                      <td><span :style="'font-weight:500;color:' + confColor(d.document_confidence)" x-text="d.document_confidence != null ? fmtConf(d.document_confidence) : '—'"></span></td>
                      <td class="mono text-sm text-hint" x-text="d.pipeline_version"></td>
                      <td class="text-sm text-muted" x-text="fmtDate(d.created_at)"></td>
                      <td @click.stop><div class="flex gap-8"><button class="btn btn-sm" @click="reprocess(d.id)">&#8635;</button><button class="btn btn-sm btn-danger" @click="deleteDoc(d.id)">&times;</button></div></td>
                    </tr>
                  </template>
                </tbody>
              </table>
            </div>
          </div>
        </template>
      </div>

      <div x-show="view==='detail'">
        <template x-if="modalLoading"><div class="empty"><div class="spinner"></div></div></template>
        <template x-if="!modalLoading && selDoc">
          <div class="detail-page">
            <div class="detail-summary">
              <div>
                <div class="flex gap-8 items-center mb-8">
                  <span class="badge" :class="sb(selDoc.status)" x-text="(selDoc.status || '').replace(/_/g,' ')"></span>
                  <span class="stat-pill mono text-sm" x-text="selDoc.document_type || 'unknown'"></span>
                  <span class="stat-pill" x-text="fmtDate(selDoc.created_at)"></span>
                </div>
                <div class="text-sm text-muted mono" x-text="selDoc.id"></div>
              </div>
              <div class="detail-tabs">
                <button class="tab-btn" :class="detailTab==='drafts' ? 'active' : ''" @click="detailTab='drafts'">Drafts</button>
                <button class="tab-btn" :class="detailTab==='extraction' ? 'active' : ''" @click="detailTab='extraction'">Extraction</button>
                <button class="tab-btn" :class="detailTab==='evidence' ? 'active' : ''" @click="detailTab='evidence'; if (currentDraft) _loadDraftEvidence(currentDraft)">Evidence</button>
              </div>
            </div>

            <div x-show="detailTab==='drafts'">
              <div class="draft-toolbar">
                <div class="flex gap-8 items-center">
                  <select class="input input-sm" x-model="draftType">
                    <option value="internal_memo">Internal memo</option>
                    <option value="case_fact_summary">Case fact summary</option>
                    <option value="contract_summary">Contract summary</option>
                    <option value="notice_summary">Notice summary</option>
                    <option value="document_checklist">Document checklist</option>
                    <option value="affidavit_summary">Affidavit summary</option>
                  </select>
                  <button class="btn btn-primary btn-sm" @click="generateDraft()" :disabled="draftLoading">Generate</button>
                  <button class="btn btn-sm" @click="loadDrafts()" :disabled="draftLoading">&#8635;</button>
                </div>
                <div class="flex gap-8 items-center" x-show="drafts.length">
                  <button class="btn btn-sm" @click="selectDraft(selectedDraftIndex - 1)" :disabled="selectedDraftIndex === 0">&#9664;</button>
                  <span class="text-sm text-muted" x-text="draftSummaryText()"></span>
                  <button class="btn btn-sm" @click="selectDraft(selectedDraftIndex + 1)" :disabled="selectedDraftIndex >= drafts.length - 1">&#9654;</button>
                </div>
              </div>

              <template x-if="draftLoading"><div class="empty"><div class="spinner"></div></div></template>
              <template x-if="!draftLoading && !drafts.length">
                <div class="empty"><span class="text-muted">No drafts yet. Generate an internal memo to start review.</span></div>
              </template>
              <template x-if="!draftLoading && currentDraft">
                <div class="draft-shell">
                  <template x-for="section in ((currentDraft.content && currentDraft.content.sections) || [])" :key="section.key">
                    <section class="draft-section" :class="isUnsupported(section) ? 'unsupported' : ''">
                      <div class="draft-section-head">
                        <h2 x-text="section.title"></h2>
                        <div class="section-metrics">
                          <span class="badge" :class="confidenceClass(section.confidence)" x-text="section.confidence || 'medium'"></span>
                          <div class="grounding-meter" :title="'Grounding: ' + groundingText(section.grounding_score)">
                            <span>Grounding</span>
                            <div class="mini-track"><div class="mini-fill" :style="'width:' + groundingPercent(section.grounding_score) + '%;background:' + groundingColor(section.grounding_score)"></div></div>
                            <strong :style="'color:' + groundingColor(section.grounding_score)" x-text="groundingText(section.grounding_score)"></strong>
                          </div>
                        </div>
                      </div>
                      <p class="draft-content" x-text="section.content"></p>
                      <div class="evidence-list" x-show="section.evidence_chunk_ids && section.evidence_chunk_ids.length">
                        <div class="text-sm text-muted mb-8" x-text="sectionEvidence(currentDraft, section).length + ' evidence chunk(s)'"></div>
                        <template x-for="chunk in sectionEvidence(currentDraft, section)" :key="chunk.id">
                          <div class="evidence-card">
                            <div class="evidence-title">
                              <span x-text="evidenceLabel(chunk)"></span>
                              <span class="badge badge-info" x-show="chunk.jurisdiction" x-text="jurisdictionLabel(chunk.jurisdiction)"></span>
                            </div>
                            <div class="evidence-text" x-text="chunk.text"></div>
                          </div>
                        </template>
                      </div>
                      <div class="form-group mt-16" x-show="draftEditKey === currentDraft.id + ':' + section.key">
                        <textarea class="input w-full" rows="7" x-model="draftEditedContent"></textarea>
                        <div class="flex gap-8 mt-12">
                          <input class="input input-sm" placeholder="Reviewer name" x-model="draftReviewer">
                          <button class="btn btn-primary btn-sm" @click="submitDraftEdit(currentDraft, section)" :disabled="!draftReviewer.trim()">Submit edit</button>
                          <button class="btn btn-sm" @click="draftEditKey=''">Cancel</button>
                        </div>
                      </div>
                      <button class="btn btn-sm mt-12" x-show="draftEditKey !== currentDraft.id + ':' + section.key" @click="startDraftEdit(currentDraft, section)">Edit</button>
                    </section>
                  </template>
                </div>
              </template>
            </div>

            <div x-show="detailTab==='extraction'">
              <!-- Conflict warning banner -->
              <div class="conflict-banner" x-show="conflicts().length" style="margin-bottom:16px">
                <div class="conflict-banner-head">
                  <span class="conflict-icon">⚠</span>
                  <strong x-text="conflicts().length + ' conflict' + (conflicts().length === 1 ? '' : 's') + ' detected'"></strong>
                  <span class="text-sm text-muted" style="margin-left:8px">Contradictions found within this document</span>
                </div>
                <div class="conflict-list">
                  <template x-for="(c, i) in conflicts()" :key="i">
                    <div class="conflict-row">
                      <span class="badge" :class="c.severity === 'high' ? 'badge-error' : 'badge-warn'" x-text="c.severity.toUpperCase()"></span>
                      <span class="conflict-type" x-text="c.conflict_type.replace(/_/g,' ')"></span>
                      <span class="conflict-desc" x-text="c.description"></span>
                    </div>
                  </template>
                </div>
              </div>
              <div class="grid-2" style="align-items:start">
                <div class="card">
                  <div class="card-title">Extracted fields</div>
                  <template x-for="[k, v] in Object.entries((selResult && selResult.fields) || {})" :key="k">
                    <div class="field-row"><span class="field-key" x-text="k.replace(/_/g,' ')"></span><span class="field-val mono" x-text="fmtField(v)"></span></div>
                  </template>
                  <div class="defined-terms" x-show="definedTerms().length">
                    <div class="card-title mt-16">Defined Terms</div>
                    <template x-for="[term, definition] in definedTerms()" :key="term">
                      <div class="term-row">
                        <span class="term-key" x-text="'&quot;' + term + '&quot;'"></span>
                        <span class="term-val" x-text="definition"></span>
                      </div>
                    </template>
                  </div>
                </div>
                <div class="card">
                  <div class="card-title">Field confidence</div>
                  <div style="display:flex;flex-direction:column;gap:8px">
                    <template x-for="fc in ((selResult && selResult.field_confidences) || [])" :key="fc.name">
                      <div>
                        <div class="flex items-center gap-8 mb-12" style="margin-bottom:4px"><span class="text-sm" style="min-width:120px" x-text="fc.name.replace(/_/g,' ')"></span></div>
                        <div class="conf-bar"><div class="conf-track"><div class="conf-fill" :style="'width:' + Math.round(fc.confidence*100) + '%;background:' + confColor(fc.confidence)"></div></div><span class="conf-label" :style="'color:' + confColor(fc.confidence)" x-text="fmtConf(fc.confidence)"></span></div>
                      </div>
                    </template>
                  </div>
                </div>
              </div>
            </div>

            <div x-show="detailTab==='evidence'">
              <div class="card">
                <div class="card-title">Evidence for selected draft</div>
                <div class="filter-bar" style="padding:0">
                  <span class="text-sm text-muted" x-text="currentEvidence.length + ' chunk(s)'"></span>
                </div>
                <div style="display:flex;flex-direction:column;gap:10px">
                  <template x-for="chunk in currentEvidence" :key="chunk.id">
                    <div class="evidence-card">
                      <div class="evidence-title">
                        <span x-text="evidenceLabel(chunk)"></span>
                        <span class="badge badge-info" x-show="chunk.jurisdiction" x-text="jurisdictionLabel(chunk.jurisdiction)"></span>
                      </div>
                      <div class="evidence-text" x-text="chunk.text"></div>
                    </div>
                  </template>
                </div>
              </div>
            </div>
          </div>
        </template>
      </div>

      <div x-show="view==='preferences'">
        <template x-if="analyticsLoading"><div class="empty"><div class="spinner"></div></div></template>
        <template x-if="analyticsError"><div class="empty"><span class="badge badge-error" x-text="analyticsError"></span></div></template>
        <template x-if="!analyticsLoading">
          <div>
            <div class="filter-bar">
              <div class="card-title" style="margin:0">Learned Preferences</div>
              <div class="spacer"></div>
              <select class="input input-sm" x-model="preferenceFilter">
                <option value="">All document types</option>
                <option value="legal_complaint">legal_complaint</option>
                <option value="contract">contract</option>
                <option value="affidavit">affidavit</option>
                <option value="legal_notice">legal_notice</option>
                <option value="case_brief">case_brief</option>
                <option value="unknown">unknown</option>
              </select>
            </div>
            <div class="card mb-12">
              <div class="kpi-label">Average grounding score across reviewed drafts</div>
              <div class="kpi-value" x-text="averageGroundingText()"></div>
              <div class="kpi-sub">weighted section citation coverage</div>
            </div>
            <div style="display:flex;flex-direction:column;gap:12px" x-show="filteredPreferences.length">
              <template x-for="p in filteredPreferences" :key="p.id">
                <div class="preference-card">
                  <div class="preference-text" x-text="p.preference_text"></div>
                  <div class="preference-meta">
                    <span class="stat-pill mono" x-text="'Type: ' + p.document_type"></span>
                    <span class="stat-pill" x-text="'Applied: ' + p.application_count + (p.application_count === 1 ? ' time' : ' times')"></span>
                    <span class="stat-pill" x-text="'Confidence: ' + fmtConf(p.confidence)"></span>
                  </div>
                  <div class="score-row">
                    <span class="text-sm text-muted">Effectiveness</span>
                    <div class="score-track"><div class="score-fill" :style="'width:' + Math.round((p.effectiveness_score || 0) * 100) + '%'"></div></div>
                    <span class="text-sm mono" x-text="p.effectiveness_score != null ? fmtConf(p.effectiveness_score) : '—'"></span>
                  </div>
                  <details class="mt-12" x-show="p.source_edit">
                    <summary class="text-sm text-muted">Source edit</summary>
                    <div class="snippet mt-12">
                      <div class="mono" x-text="'Section: ' + ((p.source_edit && p.source_edit.section_key) || 'unknown')"></div>
                      <div class="mt-8"><strong>Before:</strong></div>
                      <div x-text="(p.source_edit && p.source_edit.original_content) || '—'"></div>
                      <div class="mt-8"><strong>After:</strong></div>
                      <div x-text="(p.source_edit && p.source_edit.edited_content) || '—'"></div>
                    </div>
                  </details>
                  <button class="btn btn-sm btn-danger mt-12" @click="deletePreference(p.id)">Delete</button>
                </div>
              </template>
            </div>
            <div class="empty" x-show="!filteredPreferences.length"><span class="text-muted">No learned preferences yet.</span></div>
          </div>
        </template>
      </div>

    </div>
  </div>

  <div class="toast" x-show="toast" x-transition x-text="toast" style="display:none"></div>
</div>
</body>
</html>
