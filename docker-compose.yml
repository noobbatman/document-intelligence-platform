# ── Shared healthcheck defaults ───────────────────────────────────────────────
x-healthcheck-defaults: &healthcheck-defaults
  interval: 10s
  timeout: 5s
  retries: 5
  start_period: 20s

# ── Shared app build args ─────────────────────────────────────────────────────
x-app: &app
  build: .
  env_file:
    - .env
  environment:
    DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/docintel
    CELERY_BROKER_URL: redis://redis:6379/0
    CELERY_RESULT_BACKEND: redis://redis:6379/1
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
  volumes:
    - ./data/uploads:/app/data/uploads
    - ./data/exports:/app/data/exports

services:

  # ── API (multiple replicas via --scale) ──────────────────────────────────────
  api:
    <<: *app
    command: >
      uvicorn app.main:app
        --host 0.0.0.0
        --port 8000
        --workers 4
        --loop uvloop
        --access-log
    ports:
      - "8000:8000"
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "curl", "-sf", "http://localhost:8000/api/v1/health/ready"]

  # ── Normal-priority worker ────────────────────────────────────────────────────
  worker:
    <<: *app
    command: >
      celery -A app.workers.celery_app.celery_app worker
        --loglevel=INFO
        --queues=documents.normal
        --concurrency=2
        --hostname=worker-normal@%h
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "celery", "-A", "app.workers.celery_app.celery_app", "inspect", "ping"]

  # ── High-priority worker ──────────────────────────────────────────────────────
  worker-high:
    <<: *app
    command: >
      celery -A app.workers.celery_app.celery_app worker
        --loglevel=INFO
        --queues=documents.high,documents.normal
        --concurrency=4
        --hostname=worker-high@%h

  # ── Webhook worker ────────────────────────────────────────────────────────────
  worker-webhooks:
    <<: *app
    command: >
      celery -A app.workers.celery_app.celery_app worker
        --loglevel=INFO
        --queues=webhooks
        --concurrency=8
        --hostname=worker-webhooks@%h

  # ── Celery Flower (monitoring) ────────────────────────────────────────────────
  flower:
    <<: *app
    command: >
      celery -A app.workers.celery_app.celery_app flower
        --port=5555
        --broker_api=redis://redis:6379/0
    ports:
      - "5555:5555"
    depends_on:
      - redis
      - worker

  # ── Review UI ─────────────────────────────────────────────────────────────────
  review-ui:
    <<: *app
    environment:
      REVIEW_API_BASE: http://api:8000/api/v1
    command: >
      streamlit run review_ui/streamlit_app.py
        --server.port 8501
        --server.address 0.0.0.0
    ports:
      - "8501:8501"

  # ── PostgreSQL ────────────────────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: docintel
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD-SHELL", "pg_isready -U postgres -d docintel"]
    command: >
      postgres
        -c max_connections=200
        -c shared_buffers=256MB
        -c work_mem=16MB
        -c maintenance_work_mem=128MB
        -c checkpoint_completion_target=0.9
        -c wal_buffers=16MB
        -c log_min_duration_statement=500

  # ── Redis ─────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "redis-cli", "ping"]
    command: >
      redis-server
        --maxmemory 512mb
        --maxmemory-policy allkeys-lru
        --appendonly yes
        --appendfsync everysec

  # ── MinIO (local S3 — swap for real S3 in production) ────────────────────────
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "curl", "-sf", "http://localhost:9000/minio/health/live"]

  # ── Prometheus ────────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"

  # ── Grafana ───────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    ports:
      - "13000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning

volumes:
  postgres_data:
  redis_data:
  minio_data:
  prometheus_data:
  grafana_data:
