name: GuardianCI Phase 1

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

# Default: deny everything. Each job below declares only what it needs.
permissions: {}

env:
  PYTHON_VERSION: "3.11"
  PIPELINE_VERSION: "0.3.0"
  LLM_EXTRACTION_ENABLED: "false"
  LLM_UNKNOWN_EXTRACTION_ENABLED: "false"
  STORAGE_BACKEND: "local"
  RATE_LIMIT_ENABLED: "false"
  COVERAGE_FAIL_UNDER: "80"
  HEALTHCHECK_URL: "http://localhost:8000/api/v1/health/ready"

jobs:
  test:
    name: Tests and coverage
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: pyproject.toml

      - name: Install OCR system dependencies
        run: sudo apt-get update && sudo apt-get install -y tesseract-ocr tesseract-ocr-eng

      - name: Install Python dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Install spaCy model
        run: python -m spacy download en_core_web_sm

      - name: Ruff check
        run: ruff check app/ tests/ scripts/guardianci_ai_review.py

      - name: Ruff format
        run: ruff format --check app/ tests/ scripts/guardianci_ai_review.py

      - name: Run pytest with coverage gate
        run: |
          pytest \
            --ignore=tests/integration \
            --cov=app \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --cov-fail-under="${COVERAGE_FAIL_UNDER}"

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml
          if-no-files-found: warn

  docker-smoke:
    name: Docker smoke and integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Create CI environment file
        run: cp .env.example .env

      - name: Build Docker image
        run: docker build -t document-intelligence-platform:${{ github.sha }} .

      - name: Start Docker Compose stack
        run: docker compose up -d --build api postgres redis

      - name: Wait for readiness endpoint
        run: |
          for attempt in {1..45}; do
            status_code="$(curl -s -o /tmp/health.out -w "%{http_code}" "${HEALTHCHECK_URL}" || true)"

            if [ "$status_code" = "200" ]; then
              echo "Readiness check passed."
              exit 0
            fi

            echo "Readiness attempt ${attempt} returned ${status_code}; retrying..."
            sleep 2
          done

          echo "Readiness check never returned 200 from ${HEALTHCHECK_URL}."
          cat /tmp/health.out || true
          docker compose logs api postgres redis
          exit 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: pyproject.toml

      - name: Install Python dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Run live HTTP integration tests
        env:
          DOCINTEL_BASE_URL: http://localhost:8000
        run: pytest tests/integration

      - name: Print container logs on failure
        if: failure()
        run: docker compose logs api postgres redis

      - name: Stop Docker Compose stack
        if: always()
        run: docker compose down --volumes --remove-orphans

  ai-review:
    name: AI review stub
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: pyproject.toml

      - name: Install AI review dependencies
        run: uv pip install --system google-genai requests

      - name: Run Gemini security review
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemma-4-31b-it' }}
          GUARDIANCI_GEMINI_ENABLED: ${{ vars.GUARDIANCI_GEMINI_ENABLED || 'true' }}
          GUARDIANCI_AUTOFIX_ENABLED: ${{ vars.GUARDIANCI_AUTOFIX_ENABLED || 'true' }}
        run: python scripts/guardianci_ai_review.py

  deploy:
    name: Deploy gate placeholder
    runs-on: ubuntu-latest
    permissions:
      contents: read  # will expand to write + packages:write in Phase 7
    needs:
      - test
      - docker-smoke
      - ai-review
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Confirm Phase 1 gate
        run: echo "All GuardianCI Phase 1 jobs passed on main. Railway deploy is added in Phase 7."
