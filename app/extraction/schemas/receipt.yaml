{
  "document_type": "receipt",
  "llm_fill": true,
  "fields": [
    {"name": "store_name", "type": "string", "required": false, "description": "Merchant/store name", "patterns": ["^\\s*([A-Z][A-Z0-9 &'\\-]{2,80})\\s*$"]},
    {"name": "receipt_date", "type": "string", "required": false, "description": "Receipt date", "patterns": ["date\\s*[:#\\-]?\\s*([A-Za-z]+\\s+\\d{1,2},?\\s+\\d{4}|\\d{1,2}\\s+[A-Za-z]+\\s+\\d{4}|\\d{1,2}[\\/\\-]\\d{1,2}[\\/\\-]\\d{2,4})"]},
    {"name": "receipt_number", "type": "string", "required": false, "description": "Receipt number", "patterns": ["receipt\\s*(?:no\\.?|number|#)\\s*[:#\\-]?\\s*([A-Z0-9\\-\\/\\.]+)"]},
    {"name": "payment_method", "type": "string", "required": false, "description": "Payment method", "patterns": ["\\b(Visa|Mastercard|Amex|Cash|Debit|Credit)[^\\n]{0,40}"]},
    {"name": "tax", "type": "number", "required": false, "description": "Tax", "patterns": ["(?:tax|vat)[^\\n:]*[:#\\-]?\\s*([$€£]?\\s?[\\d,]+(?:\\.\\d{2})?)"]},
    {"name": "total_amount", "type": "number", "required": true, "description": "Total paid", "patterns": ["(?:total\\s+paid|total)\\s*[:#\\-]?\\s*([$€£]?\\s?[\\d,]+(?:\\.\\d{2})?)"]}
  ]
}
