{
  "document_type": "contract",
  "llm_fill": true,
  "fields": [
    {"name": "effective_date", "type": "string", "required": false, "description": "Effective date", "patterns": ["effective\\s+(?:as\\s+of\\s+)?date\\s*[:#]?\\s*([A-Za-z0-9,\\-\\/ ]+)"]},
    {"name": "party_a", "type": "string", "required": true, "description": "First contracting party", "patterns": ["(?:between|party\\s+a|first\\s+party)\\s*[:#]?\\s*([A-Za-z0-9 &,\\.\\-]+?)(?=\\s+and\\s+[A-Z]|\\s*,\\s*a\\s+[A-Za-z]|$)"]},
    {"name": "party_b", "type": "string", "required": true, "description": "Second contracting party", "patterns": ["[\"”]\\s*\\)\\s*,?\\s+and\\s+([A-Z][a-z]+(?:\\s+[A-Z][a-z]+)+)\\s*\\(", "(?:party\\s+b|second\\s+party)\\s*[:#]?\\s*([A-Za-z0-9 &,\\.\\-]+)"]},
    {"name": "governing_law", "type": "string", "required": false, "description": "Governing law jurisdiction", "patterns": ["governed\\s+by[^.]{0,120}?(?:laws?\\s+of\\s+(?:the\\s+)?(?:state\\s+of\\s+)?|state\\s+of\\s+)([A-Z][A-Za-z ]+?)(?=[\\.,;\\n])"]},
    {"name": "termination_date", "type": "string", "required": false, "description": "Termination date", "patterns": ["[Tt]ermination\\s+[Dd]ate\\s*[:#]?\\s*((?:[A-Za-z]+\\s+\\d{1,2},?\\s+\\d{4}|\\d{1,2}[\\/\\-]\\d{1,2}[\\/\\-]\\d{2,4}))"]},
    {"name": "contract_value", "type": "string", "required": false, "description": "Contract value", "patterns": ["(?:contract\\s+value|total\\s+value|consideration)\\s*[:#]?\\s*([$€£]?\\s?[\\d,]+(?:\\.\\d{2})?)"]},
    {"name": "parties", "type": "list", "required": false, "all_matches": true, "description": "All named parties", "patterns": ["(?:between|and)\\s+([A-Z][A-Za-z0-9 &,\\.\\-]{3,100})"]},
    {"name": "confidentiality_clause", "type": "string", "required": false, "description": "Confidentiality clause snippet", "patterns": ["(confidential(?:ity)?[^\\n]{0,400})"]},
    {"name": "indemnification", "type": "string", "required": false, "description": "Indemnification clause snippet", "patterns": ["(indemnif(?:y|ication)[^\\n]{0,400})"]},
    {"name": "signatures", "type": "list", "required": false, "all_matches": true, "description": "Signatories", "patterns": ["By:\\s*([^\\n]{2,80})", "Name:\\s*([^\\n]{2,80})"]}
  ]
}
