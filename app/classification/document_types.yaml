{
  "invoice": {
    "description": "Commercial invoice or bill",
    "keywords": ["invoice", "bill to", "invoice number", "amount due", "tax", "subtotal", "due date", "purchase order", "remit to", "net 30", "payment terms", "line item", "qty", "unit price", "total due", "vat", "billed to", "invoice date"],
    "patterns": ["\\binvoice\\s*(?:no\\.?|number|#)\\s*[:\\-]?\\s*[A-Z0-9\\-\\/]+", "\\bamount\\s+due\\b", "\\btotal\\s+due\\b", "\\bvat\\s*\\(\\d+%\\)"]
  },
  "bank_statement": {
    "description": "Bank or credit-card statement",
    "keywords": ["statement period", "account number", "opening balance", "closing balance", "debits", "credits", "available balance", "transaction date", "reference number", "sort code", "iban", "monthly statement", "statement date"],
    "patterns": ["\\bstatement\\s+(?:period|date)\\b", "\\b(?:opening|closing)\\s+balance\\b", "\\bsort\\s+code\\s*[:\\-]?\\s*\\d{2}[-\\s]\\d{2}[-\\s]\\d{2}", "\\biban\\s*[:\\-]?\\s*[A-Z]{2}\\d{2}"]
  },
  "receipt": {
    "description": "Retail receipt",
    "keywords": ["receipt", "thank you for your purchase", "total paid", "change due", "cashier", "payment method", "items purchased", "amount tendered"],
    "patterns": ["\\breceip[t]?\\b", "\\btotal\\s+paid\\b", "\\bchange\\s+due\\b"]
  },
  "contract": {
    "description": "Contract, agreement, or legal instrument",
    "keywords": ["agreement", "whereas", "hereby", "party", "parties", "governing law", "termination", "indemnification", "warranty", "confidentiality", "intellectual property", "jurisdiction", "effective date", "obligations", "in witness whereof", "witnesseth", "heretofore", "notwithstanding", "indemnify", "licensor", "licensee", "arbitration", "consideration"],
    "patterns": ["\\bthis\\s+agreement\\b", "\\bin\\s+witness\\s+whereof\\b", "\\bhereby\\s+agrees?\\b", "\\bgoverning\\s+law\\b", "\\bnotwithstanding\\b"]
  },
  "legal_notice": {
    "description": "Legal notice, subpoena, summons, demand, or cease-and-desist letter",
    "keywords": ["notice", "cease and desist", "demand letter", "summons", "subpoena", "response deadline", "required actions", "issuing party", "receiving party", "non-compliance"],
    "patterns": ["\\bcease\\s+and\\s+desist\\b", "\\bdemand\\s+letter\\b", "\\bsummons\\b", "\\bsubpoena\\b", "\\bresponse\\s+deadline\\b"]
  },
  "legal_complaint": {
    "description": "Civil complaint or court pleading",
    "keywords": ["complaint", "civil complaint", "civil action", "class action", "plaintiff", "defendant", "jury trial demanded", "demand for jury trial", "prayer for relief", "wherefore", "cause of action", "count i", "count ii", "venue", "jurisdiction", "federal question", "united states district court", "relief sought", "damages", "injunctive relief", "declaratory relief"],
    "patterns": ["\\bcomplaint\\s+(?:for|and\\s+jury\\s+demand)\\b", "\\bunited\\s+states\\s+district\\s+court\\b", "\\bcivil\\s+action\\s+no\\.?\\b", "\\bcase\\s+(?:no\\.?|number)\\s*[:#]?\\s*[A-Z0-9:\\-]+", "\\b(?:jury\\s+trial\\s+demanded|demand\\s+for\\s+jury\\s+trial)\\b", "\\b(?:prayer\\s+for\\s+relief|wherefore)\\b", "\\bcount\\s+(?:i|ii|iii|iv|v|vi|vii|viii|ix|x|\\d+)\\b", "\\bplaintiffs?\\b.{0,160}\\b(?:v\\.?|vs\\.?|ve)\\b.{0,160}\\bdefendants?\\b"]
  },
  "case_brief": {
    "description": "Case brief or court decision summary",
    "keywords": ["plaintiff", "defendant", "court", "holding", "legal issue", "case number", "docket", "procedural history", "statute", "precedent", "decision date", "jurisdiction"],
    "patterns": ["\\bplaintiff\\s+v\\.?\\s+defendant\\b", "\\bcase\\s+(?:no\\.?|number)\\b", "\\blegal\\s+issues?\\b", "\\bholding\\b"]
  },
  "affidavit": {
    "description": "Affidavit, declaration, or sworn statement",
    "keywords": ["affidavit", "affiant", "deponent", "sworn", "notary", "notary public", "subscribed and sworn", "declarant", "declaration", "under penalty of perjury"],
    "patterns": ["\\baffidavit\\s+of\\b", "\\bsubscribed\\s+and\\s+sworn\\b", "\\bnotary\\s+public\\b", "\\bunder\\s+penalty\\s+of\\s+perjury\\b"]
  }
}
